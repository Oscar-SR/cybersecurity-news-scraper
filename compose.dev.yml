services:
  backend:
    build:
      context: .
      dockerfile: ./packages/backend/Dockerfile.dev
    container_name: backend-dev
    env_file:
      - ./.env
    ports:
      - "${BACKEND_PORT}:${BACKEND_PORT}"
    volumes:
      - backend_node_modules:/app/node_modules
      - backend_pkg_node_modules:/app/packages/backend/node_modules
    networks:
      - app-network

  frontend:
    build:
      context: .
      dockerfile: ./packages/frontend/Dockerfile.dev
    container_name: frontend-dev
    env_file:
      - ./.env
    environment:
      - VITE_API_URL=http://backend:${BACKEND_PORT}
    ports:
      - "${FRONTEND_PORT}:${FRONTEND_PORT}"
    volumes:
      - frontend_node_modules:/app/node_modules
      - frontend_pkg_node_modules:/app/packages/frontend/node_modules
      - ./packages/frontend:/app/packages/frontend
    depends_on:
      - backend
    networks:
      - app-network

volumes:
  backend_node_modules:
  backend_pkg_node_modules:
  frontend_node_modules:
  frontend_pkg_node_modules:

networks:
  app-network:
    driver: bridge
